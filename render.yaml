services:
  - type: web
    name: plum-opd-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: GEMINI_API_KEY
        sync: false          # set in Render dashboard
      - key: NEO4J_URI
        sync: false          # neo4j+s://xxxx.databases.neo4j.io
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: FRONTEND_URLS
        sync: false          # https://your-app.vercel.app
      - key: DATABASE_URL
        sync: false          # Supabase Session pooler connection string
